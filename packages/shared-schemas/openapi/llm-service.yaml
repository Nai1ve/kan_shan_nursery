openapi: 3.1.0
info:
  title: Kanshan LLM Service API
  version: 0.1.0
servers:
  - url: http://127.0.0.1:8080
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
  /llm/tasks/summarize-content:
    post:
      summary: Summarize content sources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../schemas/llm.json#/$defs/LlmTaskRequest
      responses:
        '200':
          description: Task result
          content:
            application/json:
              schema:
                $ref: ../schemas/llm.json#/$defs/LlmTaskResponse
