[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "kanshan-shared"
version = "0.1.0"
description = "Kanshan nursery shared Python utilities (config, logging, helpers)."
requires-python = ">=3.10"

[tool.setuptools.packages.find]
include = ["kanshan_shared*"]
