services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: kanshan-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kanshan}
      POSTGRES_USER: ${POSTGRES_USER:-kanshan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kanshan_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kanshan-redis
    ports:
      - "6379:6379"

volumes:
  postgres-data:
